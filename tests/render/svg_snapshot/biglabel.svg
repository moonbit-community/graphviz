<title>struct3</title>
<polygon fill="none" stroke="black" points="89.39,-0.5 89.39,-2698 642.36,-2698 642.36,-0.5 89.39,-0.5"/>
<text xml:space="preserve" text-anchor="middle" x="113.14" y="-1368.95" font-family="Times,serif" font-size="14.00">hello</text>
<text xml:space="preserve" text-anchor="middle" x="113.14" y="-1352.45" font-family="Times,serif" font-size="14.00">world</text>
<text xml:space="preserve" text-anchor="middle" x="113.14" y="-1335.95" font-family="Times,serif" font-size="14.00">
and</text>
<polyline fill="none" stroke="black" points="136.89,-0.5 136.89,-2698"/>
<text xml:space="preserve" text-anchor="middle" x="192.33" y="-2243.7" font-family="Times,serif" font-size="14.00">Thats the reason</text>
<polyline fill="none" stroke="black" points="136.89,-1799.5 247.76,-1799.5"/>
<text xml:space="preserve" text-anchor="middle" x="192.33" y="-1344.7" font-family="Times,serif" font-size="14.00">post&#45;menopausal</text>
<polyline fill="none" stroke="black" points="136.89,-900 247.76,-900"/>
<text xml:space="preserve" text-anchor="middle" x="192.33" y="-445.2" font-family="Times,serif" font-size="14.00">estrogen</text>
<polyline fill="none" stroke="black" points="247.76,-0.5 247.76,-2698"/>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2587.2" font-family="Times,serif" font-size="14.00">is</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2570.7" font-family="Times,serif" font-size="14.00">
given together with another hormone called</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2537.7" font-family="Times,serif" font-size="14.00">
progestin: The combination lowers the risk of</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2504.7" font-family="Times,serif" font-size="14.00">
endometrial cancer.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2471.7" font-family="Times,serif" font-size="14.00">
</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2455.7" font-family="Times,serif" font-size="14.00">
But the NTP advisers said putting all</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2422.7" font-family="Times,serif" font-size="14.00">
estrogens on the federal list would help</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2389.7" font-family="Times,serif" font-size="14.00">
women trying to balance the benefits and</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2356.7" font-family="Times,serif" font-size="14.00">
risks when choosing hormone therapy.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2323.7" font-family="Times,serif" font-size="14.00">
Physicians never discuss any of these risks</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2290.7" font-family="Times,serif" font-size="14.00">
when they are prescribing hormone therapy.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2257.7" font-family="Times,serif" font-size="14.00">
They only discuss benefits. Listing might</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2224.7" font-family="Times,serif" font-size="14.00">
force it on the table, Michelle Medinsky, a</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2191.7" font-family="Times,serif" font-size="14.00">
toxicologist from Durham, N.C., said before</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2158.7" font-family="Times,serif" font-size="14.00">
the vote.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2125.7" font-family="Times,serif" font-size="14.00">
</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2109.7" font-family="Times,serif" font-size="14.00">
The committee of scientists advises the NTP,</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2076.7" font-family="Times,serif" font-size="14.00">
a branch of the National Institutes of Health</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2043.7" font-family="Times,serif" font-size="14.00">
that every two years updates the federal list</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-2010.7" font-family="Times,serif" font-size="14.00">
of proven and suspected cancer&#45;causing</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1977.7" font-family="Times,serif" font-size="14.00">
substances.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1944.7" font-family="Times,serif" font-size="14.00">
</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1928.7" font-family="Times,serif" font-size="14.00">
The NTP typically follows its advisers</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1895.7" font-family="Times,serif" font-size="14.00">
recommendations, but an officially updated</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1862.7" font-family="Times,serif" font-size="14.00">
carcinogen list isnt expected until 2002.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1829.7" font-family="Times,serif" font-size="14.00">
</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1813.7" font-family="Times,serif" font-size="14.00">
Thursday, after a daylong debate, the panel</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1780.7" font-family="Times,serif" font-size="14.00">
declined to add talc powder to the list,</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1747.7" font-family="Times,serif" font-size="14.00">
saying there wasnt enough evidence linking</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1714.7" font-family="Times,serif" font-size="14.00">
its use in feminine hygiene products to</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1681.7" font-family="Times,serif" font-size="14.00">
ovarian cancer. The panel deadlocked over</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1648.7" font-family="Times,serif" font-size="14.00">
whether to a second type of talc, fibrous</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1615.7" font-family="Times,serif" font-size="14.00">
talc that some studies have linked to lung</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1582.7" font-family="Times,serif" font-size="14.00">
cancer in talc miners.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1549.7" font-family="Times,serif" font-size="14.00">
</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1533.7" font-family="Times,serif" font-size="14.00">
On Wednesday, the panel voted to add</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1500.7" font-family="Times,serif" font-size="14.00">
ultraviolet radiation &#45;&#45; those</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1467.7" font-family="Times,serif" font-size="14.00">
sunburn&#45;causing rays long known to cause skin</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1434.7" font-family="Times,serif" font-size="14.00">
cancer &#45;&#45; to the official carcinogen list.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1401.7" font-family="Times,serif" font-size="14.00">
</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1385.7" font-family="Times,serif" font-size="14.00">
The panel on Friday continued debating an</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1352.7" font-family="Times,serif" font-size="14.00">
association between cancers of the nose and</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1319.7" font-family="Times,serif" font-size="14.00">
sinuses with industrial exposure to wood</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1286.7" font-family="Times,serif" font-size="14.00">
dust.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1253.7" font-family="Times,serif" font-size="14.00">
</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1237.7" font-family="Times,serif" font-size="14.00">
Talc has long been controversial. When</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1204.7" font-family="Times,serif" font-size="14.00">
studies first appeared suggesting it migrated</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1171.7" font-family="Times,serif" font-size="14.00">
into the ovaries to cause tumors, many</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1138.7" font-family="Times,serif" font-size="14.00">
feminine hygiene products replaced talc with</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1105.7" font-family="Times,serif" font-size="14.00">
cornstarch.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1072.7" font-family="Times,serif" font-size="14.00">
</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1056.7" font-family="Times,serif" font-size="14.00">
Panelist Medinsky said she had been prepared</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-1023.7" font-family="Times,serif" font-size="14.00">
to list talc powder as reasonably believed</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-990.7" font-family="Times,serif" font-size="14.00">
to cause cancer. But after listening to</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-957.7" font-family="Times,serif" font-size="14.00">
hours of industry attacks on the science,</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-924.7" font-family="Times,serif" font-size="14.00">
the evidence has knocked me out of the</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-891.7" font-family="Times,serif" font-size="14.00">
reasonably category into not list, she</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-858.7" font-family="Times,serif" font-size="14.00">
said before the panel voted 7&#45;3 against</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-825.7" font-family="Times,serif" font-size="14.00">
listing talc.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-792.7" font-family="Times,serif" font-size="14.00">
</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-776.7" font-family="Times,serif" font-size="14.00">
Talc has long been controversial. When</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-743.7" font-family="Times,serif" font-size="14.00">
studies first appeared suggesting it migrated</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-710.7" font-family="Times,serif" font-size="14.00">
into the ovaries to cause tumors, many</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-677.7" font-family="Times,serif" font-size="14.00">
feminine hygiene products replaced talc with</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-644.7" font-family="Times,serif" font-size="14.00">
cornstarch.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-611.7" font-family="Times,serif" font-size="14.00">
</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-595.7" font-family="Times,serif" font-size="14.00">
Panelist Medinsky said she had been prepared</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-562.7" font-family="Times,serif" font-size="14.00">
to list talc powder as reasonably believed</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-529.7" font-family="Times,serif" font-size="14.00">
to cause cancer. But after listening to</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-496.7" font-family="Times,serif" font-size="14.00">
hours of industry attacks on the science,</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-463.7" font-family="Times,serif" font-size="14.00">
the evidence has knocked me out of the</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-430.7" font-family="Times,serif" font-size="14.00">
reasonably category into not list, she</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-397.7" font-family="Times,serif" font-size="14.00">
said before the panel voted 7&#45;3 against</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-364.7" font-family="Times,serif" font-size="14.00">
listing talc.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-331.7" font-family="Times,serif" font-size="14.00">
</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-315.7" font-family="Times,serif" font-size="14.00">
Talc in one form or the other can be found in</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-282.7" font-family="Times,serif" font-size="14.00">
many papers, paints, ceramics, food wrappers,</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-249.7" font-family="Times,serif" font-size="14.00">
hard candy, chewing gum, cosmetics and pills.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-216.7" font-family="Times,serif" font-size="14.00">
Most people are familiar with talc as a loose</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-183.7" font-family="Times,serif" font-size="14.00">
powder used in cosmetics and as a drying</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-150.7" font-family="Times,serif" font-size="14.00">
powder.</text>
<text xml:space="preserve" text-anchor="middle" x="388.35" y="-117.7" font-family="Times,serif" font-size="14.00">
abde\</text>
<polyline fill="none" stroke="black" points="528.94,-0.5 528.94,-2698"/>
