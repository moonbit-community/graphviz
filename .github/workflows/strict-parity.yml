name: strict-parity

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "moon.mod.json"
      - "**/moon.pkg.json"
      - ".github/workflows/strict-parity.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "moon.mod.json"
      - "**/moon.pkg.json"
      - ".github/workflows/strict-parity.yml"
  workflow_dispatch:

jobs:
  strict-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
      pull-requests: write
    concurrency:
      group: strict-parity-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MoonBit toolchain
        run: curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash

      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: moon version --all

      - name: Build dot CLI
        run: moon build src/cmd/dot --target native

      - name: Ordering-input capture parity fixture
        run: moon test src/layout/dot/order_pipeline_fixture_wbtest.mbt --target native --filter "plugins root/remincross mincross inputs match graphviz fixtures"

      - name: Trapezium SVG polygon invariant
        run: moon test src/render/svg/svg_test.mbt --target native --filter "render_svg keeps trapeziumlr node families as polygons"

      - name: Strict parity sentinel cases
        run: scripts/check_strict_parity.py --formats dot xdot svg --focus ldbxtried typeshar

      - name: Strict parity full corpus
        shell: bash
        run: |
          set +e
          scripts/check_strict_parity.py \
            --formats dot xdot svg \
            --write-actual \
            --write-diff \
            --report-json target/strict-parity/report.json
          rc=$?
          exit ${rc}

      - name: Upload strict parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-parity-report-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            target/strict-parity/report.json
            target/strict-parity/diff
            target/render/dot
            target/render/xdot
            target/render/svg

      - name: Build strict parity PR comment
        if: always() && github.event_name == 'pull_request'
        run: |
          mkdir -p target/strict-parity
          scripts/build_strict_parity_comment.py \
            --report target/strict-parity/report.json \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --artifact-name "strict-parity-report-${{ github.run_id }}" \
            > target/strict-parity/comment.md

      - name: Update strict parity PR comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- strict-parity-report -->';
            const body = fs.readFileSync('target/strict-parity/comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find(
              (c) => c.user && c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
